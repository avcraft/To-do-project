<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Warrior To-Do List</title>
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h2>
          True Warrior To-Do List <img src="./images/swords.png" alt="icon" />
        </h2>
        <div class="row" id="input-row">
          <input
            type="text"
            id="input-box"
            placeholder="Prepare for battle..."
          />
          <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="list-container"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
